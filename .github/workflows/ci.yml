name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest
          python -m pip install -e ./Safety-Capability -e ./Enhancement-Capability -e ./Automation-Capability -e ./Collaboration-Connectivity-Capability -e ./Personal-Secretary-Capability
      - name: Ecosystem tests
        run: python -m unittest discover -s tests -v
      - name: Safety tests
        run: python -m pytest Safety-Capability/tests -q
      - name: Enhancement tests
        run: python -m pytest Enhancement-Capability/tests -q
      - name: Automation tests
        run: python -m pytest Automation-Capability/tests -q
      - name: Collaboration and Connectivity tests
        run: python -m pytest Collaboration-Connectivity-Capability/tests -q
      - name: Personal Secretary tests
        run: python -m pytest Personal-Secretary-Capability/tests -q
